version: '3.8'

services:
  backend:
    build: ./backend
    container_name: psicontrol-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/psicologia.db
      - SECRET_KEY=${SECRET_KEY:-cambia-esta-clave-en-produccion-min32chars}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: psicontrol-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}

volumes:
  data:
